<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>計算チャレンジ</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
font-family:sans-serif;
text-align:center;
}

table{
border-collapse:collapse;
margin:auto;
margin-top:20px;
}

td{
border:2px solid black;
width:70px;
height:70px;
font-size:28px;
}

input{
width:100%;
height:100%;
font-size:28px;
text-align:center;
border:none;
}

button,select{
font-size:20px;
padding:8px;
margin:5px;
}

#result{
margin-top:20px;
font-size:24px;
}

#keypad{
margin-top:20px;
display:grid;
grid-template-columns:repeat(3,80px);
gap:10px;
justify-content:center;
}

.key{
font-size:28px;
padding:15px;
background:#eee;
border-radius:10px;
}

@media (max-width:900px){

td{
width:9vw;
height:9vw;
font-size:5vw;
}

input{
font-size:5vw;
}

}

</style>
</head>

<body>

<h2>計算チャレンジ</h2>

<div>

演算：
<select id="operatorSelect">
<option value="+">＋</option>
<option value="-">－</option>
<option value="×">×</option>
<option value="÷">÷</option>
</select>

モード：
<select id="modeSelect">
<option value="int">整数</option>
<option value="decimal">小数</option>
<option value="fraction">分数</option>
</select>

上段の範囲：
<select id="tensSelect">
<option value="0">0〜10</option>
<option value="10">10〜19</option>
<option value="20">20〜29</option>
<option value="30">30〜39</option>
<option value="40">40〜49</option>
<option value="50">50〜59</option>
<option value="60">60〜69</option>
<option value="70">70〜79</option>
<option value="80">80〜89</option>
<option value="90">90〜99</option>
</select>

問題数：
<select id="questionCount">
<option value="10">10問</option>
<option value="100">100問</option>
</select>

<button onclick="startGame()">スタート</button>

</div>

<table id="calcTable"></table>

<div id="result"></div>

<div id="keypad"></div>

<script>

let startTime;
let operator;
let baseNumber;
let numbers=[];
let answers=[];
let currentInput=null;

function calculate(a,b,op){

if(op==="+") return a+b;
if(op==="-") return a-b;
if(op==="×") return a*b;
if(op==="÷") return a/b;

}

function shuffle(array){
for(let i=array.length-1;i>0;i--){
let j=Math.floor(Math.random()*(i+1));
[array[i],array[j]]=[array[j],array[i]];
}
return array;
}

function startGame(){

operator=document.getElementById("operatorSelect").value;
let tens=parseInt(document.getElementById("tensSelect").value);
let qCount=parseInt(document.getElementById("questionCount").value);

numbers=[];
answers=[];

/* 元の数 */

if(operator=="-"){
baseNumber=Math.floor(Math.random()*90)+10;
}else{
baseNumber=Math.floor(Math.random()*9)+1;
}

/* 上段範囲 */

let pool=[];
let start=tens;
let end=tens+9;

if(tens==0) end=10;

for(let i=start;i<=end;i++){
pool.push(i);
}

shuffle(pool);

/* 問題作成 */

for(let i=0;i<qCount;i++){

let n=pool[i%pool.length];

numbers.push(n);

answers.push(calculate(baseNumber,n,operator));

}

startTime=performance.now();

let table=document.getElementById("calcTable");
table.innerHTML="";

let row1=document.createElement("tr");
let row2=document.createElement("tr");

let opCell=document.createElement("td");
opCell.innerText=operator;

let baseCell=document.createElement("td");
baseCell.innerText=baseNumber;

row1.appendChild(opCell);
row2.appendChild(baseCell);

for(let i=0;i<qCount;i++){

let td1=document.createElement("td");
td1.innerText=numbers[i];

let td2=document.createElement("td");

let input=document.createElement("input");

input.dataset.index=i;

input.onclick=function(){
currentInput=this;
}

input.onkeydown=function(e){

let index=parseInt(this.dataset.index);

if(e.key==="Enter"){

if(index<numbers.length-1){

document.querySelectorAll("input")[index+1].focus();

}else{

finishGame();

}

}

}

td2.appendChild(input);

row1.appendChild(td1);
row2.appendChild(td2);

}

table.appendChild(row1);
table.appendChild(row2);

document.querySelector("input").focus();

createKeypad();

}

/* テンキー */

function createKeypad(){

let keypad=document.getElementById("keypad");

keypad.innerHTML="";

let keys=["7","8","9","4","5","6","1","2","3","0",".","←"];

keys.forEach(k=>{

let btn=document.createElement("div");
btn.className="key";
btn.innerText=k;

btn.onclick=function(){

if(!currentInput) return;

if(k=="←"){
currentInput.value=currentInput.value.slice(0,-1);
}else{
currentInput.value+=k;
currentInput.dispatchEvent(new Event("input"));
}

}

keypad.appendChild(btn);

});

}

function finishGame(){

let endTime=performance.now();

let time=((endTime-startTime)/1000).toFixed(2);

let inputs=document.querySelectorAll("input");

let correct=0;

inputs.forEach((input,i)=>{

let user=parseFloat(input.value);

if(Math.abs(user-answers[i])<0.0001){
correct++;
}

});

document.getElementById("result").innerHTML=
"タイム："+time+" 秒<br>正答数："+correct+" / "+numbers.length;

}

</script>

</body>
</html>
