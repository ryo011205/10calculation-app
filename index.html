<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>10算チャレンジ</title>

<style>

body{
font-family:sans-serif;
text-align:center;
}

#grid{
display:grid;
grid-template-columns: repeat(11,70px);
gap:5px;
justify-content:center;
margin-top:20px;
}

.cell{
border:1px solid #aaa;
height:60px;
display:flex;
align-items:center;
justify-content:center;
font-size:22px;
}

input{
width:60px;
height:50px;
font-size:24px;
text-align:center;
}

#keypad{
margin-top:20px;
display:grid;
grid-template-columns:repeat(3,80px);
gap:10px;
justify-content:center;
}

.key{
background:#eee;
padding:15px;
font-size:24px;
border-radius:8px;
}

#result{
font-size:24px;
margin-top:20px;
}

</style>
</head>

<body>

<h2>計算トレーニング</h2>

<button onclick="startGame()">開始</button>
<button onclick="finishGame()">終了</button>

<div id="grid"></div>

<div id="keypad"></div>

<div id="result"></div>

<script>

let startTime
let activeInput=null
let answers=[]
let correct=0

function startGame(){

document.getElementById("grid").innerHTML=""
answers=[]
correct=0

startTime=performance.now()

let base=Math.floor(Math.random()*90)+10

let nums=[]

while(nums.length<10){

let n=Math.floor(Math.random()*base)

if(!nums.includes(n)) nums.push(n)

}

let grid=document.getElementById("grid")

grid.appendChild(makeCell("+"))

grid.appendChild(makeCell(base))

for(let n of nums){

grid.appendChild(makeCell(n))

}

grid.appendChild(makeCell("="))
grid.appendChild(makeCell(""))

for(let n of nums){

let ans=base+n
answers.push(ans)

let input=document.createElement("input")

input.readOnly=true

input.onclick=function(){
activeInput=input
}

let cell=document.createElement("div")
cell.className="cell"
cell.appendChild(input)

grid.appendChild(cell)

}

createKeypad()

}

function makeCell(text){

let d=document.createElement("div")
d.className="cell"
d.innerText=text
return d

}

function createKeypad(){

let k=document.getElementById("keypad")
k.innerHTML=""

for(let i=1;i<=9;i++){

let b=document.createElement("div")
b.className="key"
b.innerText=i
b.onclick=()=>press(i)

k.appendChild(b)

}

let zero=document.createElement("div")
zero.className="key"
zero.innerText=0
zero.onclick=()=>press(0)

k.appendChild(zero)

let del=document.createElement("div")
del.className="key"
del.innerText="←"
del.onclick=backspace

k.appendChild(del)

let next=document.createElement("div")
next.className="key"
next.innerText="OK"
next.onclick=nextInput

k.appendChild(next)

}

function press(n){

if(!activeInput) return

activeInput.value+=n

}

function backspace(){

if(!activeInput) return

activeInput.value=activeInput.value.slice(0,-1)

}

function nextInput(){

let inputs=document.querySelectorAll("input")

for(let i=0;i<inputs.length;i++){

if(inputs[i]===activeInput){

if(i<inputs.length-1){

activeInput=inputs[i+1]

}else{

activeInput=null

}

break

}

}

}

function finishGame(){

let inputs=document.querySelectorAll("input")

correct=0

inputs.forEach((inp,i)=>{

if(parseFloat(inp.value)==answers[i]) correct++

})

let end=performance.now()

let time=((end-startTime)/1000).toFixed(2)

document.getElementById("result").innerHTML=
"タイム："+time+"秒　正解："+correct+"/"+answers.length

}

</script>

</body>
</html>
